"Oběd", "place": "Jídelna"}, {"id": "meal-2026-06-15-dinner", "type": "meal", "date": "2026-06-15", "start": "17:00", "end": "17:45", "title": "Večeře", "place": "Jídelna"}, {"id": "meal-2026-06-16-breakfast", "type": "meal", "date": "2026-06-16", "start": "07:00", "end": "07:45", "title": "Snídaně", "place": "Jídelna"}, {"id": "proc-2026-06-16-1", "type": "procedure", "date": "2026-06-16", "start": "08:00", "end": "08:20", "title": "Slatinná koupel", "place": "LDB-Slatina 1"}, {"id": "proc-2026-06-16-2", "type": "procedure", "date": "2026-06-16", "start": "09:30", "end": "09:50", "title": "Klasická masáž částečná", "place": "LDB-Slatina 1"}, {"id": "proc-2026-06-16-3", "type": "procedure", "date": "2026-06-16", "start": "12:00", "end": "12:20", "title": "Vysokoindukční magnet", "place": "LDB-Elektroléčba"}, {"id": "meal-2026-06-16-lunch", "type": "meal", "date": "2026-06-16", "start": "11:00", "end": "11:45", "title": "Oběd", "place": "Jídelna"}, {"id": "meal-2026-06-16-dinner", "type": "meal", "date": "2026-06-16", "start": "17:00", "end": "17:45", "title": "Večeře", "place": "Jídelna"}, {"id": "meal-2026-06-17-breakfast", "type": "meal", "date": "2026-06-17", "start": "07:00", "end": "07:45", "title": "Snídaně", "place": "Jídelna"}, {"id": "proc-2026-06-17-1", "type": "procedure", "date": "2026-06-17", "start": "09:00", "end": "09:20", "title": "Vysokoindukční magnet", "place": "LDB-Elektroléčba"}, {"id": "proc-2026-06-17-2", "type": "procedure", "date": "2026-06-17", "start": "10:30", "end": "10:50", "title": "Parafínový zábal", "place": "LDB-Parafín"}, {"id": "proc-2026-06-17-3", "type": "procedure", "date": "2026-06-17", "start": "12:15", "end": "12:35", "title": "IMOOVE", "place": "LDB-Fyzioterapie 4"}, {"id": "meal-2026-06-17-lunch", "type": "meal", "date": "2026-06-17", "start": "11:00", "end": "11:45", "title": "Oběd", "place": "Jídelna"}, {"id": "meal-2026-06-17-dinner", "type": "meal", "date": "2026-06-17", "start": "17:00", "end": "17:45", "title": "Več <script>
const STORAGE_KEY="lazensky_commander_schedule_v3";const DONE_KEY="lazensky_commander_done_v3";const DEFAULT=JSON.parse(document.getElementById("initial-data").textContent);
let state={tab:"today",data:loadData(),done:loadDone(),openDate:null,raw:"",msg:"Import připravený. Výchozí data začínají dnešní večeří.",msgTone:""};state.raw=JSON.stringify(state.data,null,2);
function loadData(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||DEFAULT}catch{return DEFAULT}}function loadDone(){try{return new Set(JSON.parse(localStorage.getItem(DONE_KEY))||[])}catch{return new Set()}}function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state.data))}function saveDone(){localStorage.setItem(DONE_KEY,JSON.stringify([...state.done]))}
function pad(v){return String(v).padStart(2,"0")}function iso(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}function addDays(d,n){const x=new Date(d);x.setHours(12,0,0,0);x.setDate(x.getDate()+n);return x}function dt(date,time){return new Date(date+"T"+time+":00")}function addMinutes(date,m){return new Date(date.getTime()+m*60000)}function minBetween(a,b){return Math.round((b-a)/60000)}function fmtTime(d){return new Intl.DateTimeFormat("cs-CZ",{hour:"2-digit",minute:"2-digit"}).format(d)}function fmtDate(date){return new Intl.DateTimeFormat("cs-CZ",{weekday:"long",day:"numeric",month:"numeric"}).format(new Date(date+"T12:00:00"))}function fmtStayDate(date){return new Intl.DateTimeFormat("cs-CZ",{day:"numeric",month:"numeric",year:"numeric"}).format(new Date(date+"T12:00:00"))}
function countdown(m){if(m<=0)return"teď";if(m<60)return m+" min";const h=Math.floor(m/60),mm=m%60;return mm?`${h} h ${mm} min`:`${h} h`}function ringNumber(m){if(m<180)return [m,"MIN"];const h=Math.floor(m/60);return [h,"HOD"]}function itemsFor(date){return state.data.items.filter(i=>i.date===date).sort((a,b)=>a.start.localeCompare(b.start))}function dates(){return [...new Set(state.data.items.map(i=>i.date))].sort()}function parseMin(t){if(!t)return null;const[h,m]=t.split(":").map(Number);return h*60+m}function gap(a,b){const x=parseMin(a),y=parseMin(b);if(x==null||y==null)return"—";const d=y-x;if(d<=0)return"0 min";const h=Math.floor(d/60),m=d%60;return h&&m?`${h} h ${m} min`:h?`${h} h`:`${m} min`}
function dayStats(date){const list=itemsFor(date),proc=list.filter(i=>i.type==="procedure"),meals=list.filter(i=>i.type==="meal"),dinner=meals.find(i=>i.title==="Večeře"),first=list[0],last=proc[proc.length-1];return{procedures:proc.length,first:first?.start||"—",end:last?.end||"—",free:gap(last?.end,dinner?.start)}}function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function setTab(tab){state.tab=tab;window.scrollTo(0,0);render()}function toggleDone(id){state.done.has(id)?state.done.delete(id):state.done.add(id);saveDone();render()}
function normalize(parsed){if(!parsed.items?.length)throw new Error("Import neobsahuje položky items.");const ds=[...new Set(parsed.items.map(i=>i.date))].sort();return{stay:{...DEFAULT.stay,...(parsed.stay||{}),stayFrom:parsed.stay?.stayFrom||ds[0],stayTo:parsed.stay?.stayTo||ds[ds.length-1]},items:parsed.items.map((i,idx)=>({id:i.id||`${i.type||"procedure"}-${i.date}-${i.start}-${idx}`,type:i.type==="meal"?"meal":"procedure",date:i.date,start:i.start,end:i.end||i.start,title:i.title||i.name,place:i.place||i.location||"—"}))}}function importRaw(){try{const data=normalize(JSON.parse(state.raw));state.data=data;saveData();state.raw=JSON.stringify(data,null,2);state.msg=`Načteno: ${data.items.length} položek, ${dates().length} dnů.`;state.msgTone="ok";render()}catch(e){state.msg=e.message||"Import se nepodařilo načíst.";state.msgTone="err";render()}}function loadDefault(){state.data=DEFAULT;state.raw=JSON.stringify(DEFAULT,null,2);saveData();state.msg="Vložený testovací pobyt na 28 dnů.";state.msgTone="";render()}function readFile(input){const file=input.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{state.raw=String(r.result||"");state.msg=`Soubor připravený: ${file.name}`;state.msgTone="";render()};r.readAsText(file)}
function header(){const s=state.data.stay;return `<header><div class="top"><button class="ghost">☰</button><button class="ghost">⚙</button></div><div class="hero"><img class="logo" src="./icon-180.png" alt="Logo"><div><h1>${esc(s.appName||"Lázeňský Komandér")}</h1><div class="meta"><div>⌖ ${esc(s.spaName)}</div><div>◷ Rezerva na přesun: ${s.leaveBufferMinutes||15} min</div></div></div></div></header>`}
function nowCard(current,next){if(!current)return`<section class="card empty"><div class="kicker" style="color:#94a3b8">Právě teď</div><div class="emptytitle">Volno</div><div class="emptytext">${next?`Další položka začíná v ${next.start}`:"Na dnešek už nic dalšího nevidím."}</div></section>`;const now=new Date(),end=dt(current.date,current.end),start=dt(current.date,current.start),left=Math.max(0,minBetween(now,end)),isMeal=current.type==="meal",r=ringNumber(left);return`<section class="card now ${isMeal?"":"procedure"}"><span class="pill">Probíhá</span><div class="kicker">Právě teď</div><div class="nowtime">${current.start} – ${current.end}</div><div class="nowtitle">${esc(current.title)}</div><div class="place">${isMeal?"♨":"⌖"} ${esc(current.place)}</div><div class="ringbox"><div class="ringlabel">Zbývá</div><div class="ring">${r[0]}<small>${r[1]}</small></div></div></section>`}
function nextProcedureCard(next){if(!next)return"";const s=state.data.stay,now=new Date(),start=dt(next.date,next.start),leave=addMinutes(start,-(s.leaveBufferMinutes||15)),toStart=Math.max(0,minBetween(now,start)),toLeave=Math.max(0,minBetween(now,leave)),showDate=iso(now)!==next.date,r=ringNumber(toStart);return`<section class="card next"><span class="pill">Následuje</span><div class="kicker">Další procedura${showDate?` · ${fmtDate(next.date)}`:""}</div><div class="nexttime">${next.start}</div><div class="nexttitle">${esc(next.title)}</div><div class="place">⌖ ${esc(next.place)}</div><div class="leavegrid"><div class="leave"><div class="label">Odejít nejpozději</div><div class="value">${fmtTime(leave)}</div><b>za ${countdown(toLeave)}</b></div><div class="startlabel">Začíná za<div class="ring">${r[0]}<small>${r[1]}</small></div></div></div></section>`}
function daySummary(date,label){const s=dayStats(date);return`<section class="card daycard"><div class="kicker" style="color:#94a3b8">${label}</div><div class="date">${fmtDate(date)}</div><div class="stats"><div class="stat"><span>Procedury</span><b>${s.procedures}</b></div><div class="stat"><span>První</span><b>${s.first}</b></div><div class="stat"><span>Konec</span><b>${s.end}</b></div></div><div class="fullstat">Volno po procedurách do večeře: <b>${s.free}</b></div></section>`}
function itemCard(item,now){const done=state.done.has(item.id)||dt(item.date,item.end)<now,isMeal=item.type==="meal",leave=fmtTime(addMinutes(dt(item.date,item.start),-(state.data.stay.leaveBufferMinutes||15)));return`<article class="item ${isMeal?"meal":"procedure"} ${done?"done":""}"><div><div class="itemtime"><span>${item.start}</span><span class="end">– ${item.end}</span></div><div class="itemtitle">${esc(item.title)}</div><div class="itemplace">${isMeal?"♨":"⌖"} ${esc(item.place)}</div></div><div class="rightcol"><span class="tag">${isMeal?"Jídlo":"Procedura"}</span><div class="leave-mini"><span>Odejít</span><b>${leave}</b></div><button class="check ${state.done.has(item.id)?"manual":""}" onclick="toggleDone('${item.id}')">✓</button></div></article>`}
function todayView(){const ds=dates(),today=ds.includes(iso(new Date()))?iso(new Date()):ds[0],list=itemsFor(today),now=new Date(),current=list.find(i=>now>=dt(i.date,i.start)&&now<=dt(i.date,i.end)),nextToday=list.find(i=>dt(i.date,i.start)>now),nextAny=state.data.items.filter(i=>dt(i.date,i.start)>now).sort((a,b)=>dt(a.date,a.start)-dt(b.date,b.start))[0];return`<main class="content">${nowCard(current,nextToday)}${nextEventCard(nextAny)}${daySummary(today,"Dnešní program")}<div class="list">${list.map(i=>itemCard(i,now)).join("")}</div></main>`}
function tomorrowView(){const d=iso(addDays(new Date(),1)),ds=dates(),day=ds.includes(d)?d:ds[1]||ds[0],now=dt(day,"07:20"),list=itemsFor(day);return`<main class="content">${daySummary(day,"Zítra")}<div class="list">${list.map(i=>itemCard(i,now)).join("")}</div></main>`}
function weekView(){const ds=dates();if(!state.openDate)state.openDate=ds[0];return`<main class="content">${ds.map(d=>`<section><button style="all:unset;display:block;width:100%" onclick="state.openDate=state.openDate==='${d}'?'':'${d}';render()">${daySummary(d,"Den pobytu")}</button>${state.openDate===d?`<div class="list" style="padding-left:6px;margin-top:12px">${itemsFor(d).map(i=>itemCard(i,dt(d,"07:20"))).join("")}</div>`:""}</section>`).join("")}</main>`}
function stayView(){const now=new Date(),rows=new Map();state.data.items.filter(i=>i.type==="procedure").forEach(i=>{const r=rows.get(i.title)||{name:i.title,planned:0,used:0};r.planned++;if(state.done.has(i.id)||dt(i.date,i.end)<now)r.used++;rows.set(i.title,r)});const sum=[...rows.values()].sort((a,b)=>b.planned-a.planned||a.name.localeCompare(b.name,"cs")),used=sum.reduce((a,r)=>a+r.used,0),planned=sum.reduce((a,r)=>a+r.planned,0),s=state.data.stay;return`<main class="content"><div class="two"><div class="topstat" style="border-color:#6d28d9;background:#1e1038"><span>Procedury</span><br><b>${used}/${planned}</b><p>vyčerpáno / plán</p></div><div class="topstat" style="border-color:#16a34a;background:#04251f"><span>Dny pobytu</span><br><b>${dates().length}</b><p>celkem</p></div></div><section class="card"><h2>Informace o pobytu</h2><div class="info-grid"><div class="info"><span>Lázně</span><b>${esc(s.spaName)}</b></div><div class="info"><span>Pobyt</span><b>${fmtStayDate(s.stayFrom)} až ${fmtStayDate(s.stayTo)}</b></div><div class="info"><span>Lékař</span><b>${esc(s.doctor)}</b><p>${esc(s.doctorOffice||"")}</p></div><div class="info"><span>Diagnóza</span><b>${esc(s.diagnosis)}</b></div><div class="info"><span>Pokoj</span><b>${esc(s.room)}</b></div><div class="info"><span>Jídlo</span><b>${esc(s.mealShift)}</b></div></div></section><section class="card"><h2>Souhrn procedur</h2><div class="list">${sum.map(r=>`<div class="info"><div style="display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center;font-size:18px"><b>${esc(r.name)}</b><b style="white-space:nowrap">${r.used}/${r.planned}</b></div><div class="progress"><i style="width:${Math.round(r.used/r.planned*100)}%"></i></div></div>`).join("")}</div></section></main>`}
function importView(){return`<main class="content"><section class="card"><div class="hero"><img class="logo" src="./icon-180.png" alt="Logo"><div><div class="kicker" style="color:#94a3b8">Import / změna</div><h2 style="margin:.2em 0 0">Rozpis pobytu</h2></div></div><div class="msg ${state.msgTone}">${esc(state.msg)}</div><textarea id="raw">${esc(state.raw)}</textarea><div class="actions"><button class="btn" onclick="state.raw=document.getElementById('raw').value;importRaw()">Načíst</button><button class="btn secondary" onclick="loadDefault()">28 dnů</button></div><label class="filebtn">Vybrat JSON soubor<input type="file" accept=".json,application/json,text/plain" onchange="readFile(this)"></label></section></main>`}
function nav(){const tabs=[["today","Dnes","◷"],["tomorrow","Zítra","▦"],["week","Týden","▦"],["stay","Pobyt","♙"],["import","Import","☁"]];return`<nav><div class="inner">${tabs.map(([id,label,ico])=>`<button onclick="setTab('${id}')" class="${state.tab===id?"active":""}"><span class="ico">${ico}</span>${label}</button>`).join("")}</div></nav>`}
function render(){const views={today:todayView,tomorrow:tomorrowView,week:weekView,stay:stayView,import:importView};document.getElementById("app").innerHTML=`<div class="app">${header()}${views[state.tab]()}${nav()}</div>`}render();setInterval(render,30000);if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{});
</script>
