name: Update today alarms

on:
  schedule:
    # 02:25 UTC = 04:25 Europe/Prague during summer time.
    - cron: '25 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-today:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate today.json
        run: python tools/update_today.py

      - name: Commit today.json if changed
        run: |
          if git diff --quiet -- today.json; then
            echo "today.json unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add today.json
          git commit -m "update today alarms"
          git push
